version: "3.9"

networks:
  revenos_net:
    driver: bridge

volumes:
  redis_data:
    driver: local

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: revenos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6380"
    volumes:
      - redis_data:/data
    networks:
      - revenos_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: revenos_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - revenos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Workers ──────────────────────────────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: revenos_workers
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - revenos_net

  # ── Web (Frontend) ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: revenos_web
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - revenos_net
