version: "3.9"

networks:
  revenos_net:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: revenos_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production        # ← single source of truth
    networks:
      - revenos_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: revenos_workers
    restart: unless-stopped
    env_file:
      - .env.production        # ← same file
    networks:
      - revenos_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # docker-compose interpolates these from .env.production
        # (passed via --env-file flag at runtime — see deploy command below)
        VITE_API_URL: ${VITE_API_URL}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: revenos_web
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - revenos_net
