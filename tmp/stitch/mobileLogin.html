<p class="text-on-surface-variant text-sm font-medium">Elevate your outreach with AI precision</p>
</div>
<form class="space-y-5">

<div class="relative group">

<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[14px] font-semibold text-on-surface-variant">Password</label>
<a class="text-[12px] font-bold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-white font-bold py-3.5 rounded-lg shadow-md shadow-primary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-all group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="relative py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline"></div>
</div>
<div class="relative flex justify-center text-xs font-semibold uppercase tracking-wider">
<span class="bg-surface px-4 text-secondary">Or continue with</span>
</div>
</div>
<button class="w-full bg-surface border border-outline text-on-surface font-semibold py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-surface-container-low active:scale-[0.98] transition-all">

</p>
