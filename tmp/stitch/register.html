<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | SalesForge AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

                        "surface-variant": "#f1f5f9",
                        "secondary-fixed-dim": "#cbd5e1",
                        "surface-container-highest": "#cbd5e1",
                        "on-error-container": "#991b1b",
                        "on-tertiary-fixed-variant": "#6d28d9",
                        "surface-container-low": "#f8fafc",
                        "outline": "#e2e8f0",
                        "on-primary-container": "#1e40af",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#dbeafe",
                        "surface-container": "#f1f5f9",
                        "inverse-surface": "#1e293b",
                        "surface-dim": "#f5f7f8",
                        "on-surface": "#0f172a",
                        "tertiary-container": "#ede9fe",
                        "on-background": "#0f172a",
                        "secondary": "#64748b",
                        "surface": "#ffffff",
                        "primary": "#3c83f6",
                        "on-error": "#ffffff",
                        "surface-tint": "#3c83f6",

                        "tertiary-fixed-dim": "#ddd6fe",
                        "on-secondary-fixed": "#0f172a",
                        "on-tertiary-container": "#5b21b6",
                        "error-container": "#fee2e2",
                        "primary-container": "#dbeafe",
                        "tertiary": "#8b5cf6",
                        "inverse-on-surface": "#f8fafc",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "on-tertiary-fixed": "#2e1065",
                        "inverse-primary": "#93c5fd",

                    },
                    "borderRadius": {

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar Suppression Check: Transactional page (Signup) - TopNavBar is not rendered based on "Semantic Shell" mandate for focused journeys -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface">SalesForge AI</h1>
<p class="text-on-surface-variant mt-2">Start your 14-day free trial</p>
</div>
<!-- Signup Card -->
<div class="bg-surface border border-outline rounded-xl shadow-sm p-8">
<div class="space-y-6">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-outline rounded-lg text-on-surface-variant font-medium hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.12c-.22-.67-.35-1.39-.35-2.12s.13-1.45.35-2.12V7.04H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.96l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 6.16l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign up with Google
                    </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-outline-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline"></div>
</div>
<!-- Form Fields -->
<form action="#" class="space-y-4" method="POST">
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="full_name">Full Name</label>
<div class="relative">
<input class="w-full px-4 py-2.5 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="work_email">Work Email</label>
<div class="relative">
<input class="w-full px-4 py-2.5 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline-variant" id="work_email" name="work_email" placeholder="john@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-2.5 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-blue-600 text-on-primary font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-[0.98]" type="submit">
                                Create Account
                            </button>
</div>
</form>
</div>
<!-- Trust Signal -->
<div class="mt-8 flex items-center justify-center gap-2 px-4 py-3 bg-primary-container/30 rounded-lg">
<span class="material-symbols-outlined text-on-primary-container text-sm" data-icon="verified">verified</span>
<p class="text-xs font-medium text-on-primary-container">14-day free trial, no credit card required</p>
</div>
</div>
<!-- Footer Links -->
<p class="text-center mt-8 text-on-surface-variant text-sm">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline" href="/login">Login</a>
</p>
</div>
</main>
<!-- Footer Component from JSON -->
<footer class="bg-slate-50 dark:bg-slate-950 w-full mt-auto border-t border-slate-200 dark:border-slate-800">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full max-w-7xl mx-auto">
<div class="mb-4 md:mb-0">
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">© 2024 SalesForge AI. All rights reserved.</p>
</div>
<div class="flex gap-6">
<a class="text-sm font-normal text-slate-500 hover:text-slate-700 transition-all duration-200" href="#">Privacy Policy</a>
<a class="text-sm font-normal text-slate-500 hover:text-slate-700 transition-all duration-200" href="#">Terms of Service</a>
<a class="text-sm font-normal text-slate-500 hover:text-slate-700 transition-all duration-200" href="#">Help Center</a>
</div>
</div>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
</body></html>
