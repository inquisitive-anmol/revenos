<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | SalesForge AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e2e8f0",
                    "error": "#ef4444",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#cbd5e1",
                    "tertiary-fixed": "#ede9fe",
                    "secondary-container": "#f1f5f9",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#e2e8f0",
                    "on-secondary-container": "#334155",
                    "background": "#f5f7f8",
                    "primary-fixed-dim": "#bfdbfe",
                    "surface-variant": "#f1f5f9",
                    "secondary-fixed-dim": "#cbd5e1",
                    "surface-container-highest": "#cbd5e1",
                    "on-error-container": "#991b1b",
                    "on-tertiary-fixed-variant": "#6d28d9",
                    "surface-container-low": "#f8fafc",
                    "outline": "#e2e8f0",
                    "on-primary-container": "#1e40af",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#dbeafe",
                    "surface-container": "#f1f5f9",
                    "inverse-surface": "#1e293b",
                    "surface-dim": "#f5f7f8",
                    "on-surface": "#0f172a",
                    "tertiary-container": "#ede9fe",
                    "on-background": "#0f172a",
                    "secondary": "#64748b",
                    "surface": "#ffffff",
                    "primary": "#3c83f6",
                    "on-error": "#ffffff",
                    "surface-tint": "#3c83f6",
                    "surface-bright": "#ffffff",
                    "on-primary-fixed": "#1e3a8a",
                    "tertiary-fixed-dim": "#ddd6fe",
                    "on-secondary-fixed": "#0f172a",
                    "on-tertiary-container": "#5b21b6",
                    "error-container": "#fee2e2",
                    "primary-container": "#dbeafe",
                    "tertiary": "#8b5cf6",
                    "inverse-on-surface": "#f8fafc",
                    "on-primary-fixed-variant": "#1d4ed8",
                    "on-tertiary-fixed": "#2e1065",
                    "inverse-primary": "#93c5fd",
                    "on-secondary-fixed-variant": "#334155",
                    "on-surface-variant": "#475569"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar Suppressed as per Focus-Task Rule for Login Screen -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2">SalesForge AI</h1>
<p class="text-on-surface-variant font-medium">Elevate your outreach with AI precision</p>
</div>
<!-- Login Card -->
<div class="bg-surface border border-outline rounded-xl shadow-xl p-8 md:p-10">
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block text-sm font-semibold text-on-surface-variant mb-2" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-secondary/50" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-semibold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-secondary">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-secondary/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3 px-4 bg-primary text-on-primary font-bold rounded-lg shadow-md hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-surface text-secondary font-medium">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface border border-outline rounded-lg text-on-surface font-semibold hover:bg-surface-container-low transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Sign in with Google
                </button>
<!-- Footer Link -->
<p class="mt-8 text-center text-on-surface-variant font-medium">
                    New to SalesForge AI? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Footer Component from JSON -->
<footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 w-full mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 w-full max-w-7xl mx-auto">
<p class="text-sm font-normal text-slate-500 dark:text-slate-400 mb-6 md:mb-0">
                © 2024 SalesForge AI. All rights reserved.
            </p>
<div class="flex gap-8">
<a class="text-sm font-normal text-slate-500 hover:text-slate-900 dark:hover:text-slate-200 transition-all duration-200" href="#">Privacy Policy</a>
<a class="text-sm font-normal text-slate-500 hover:text-slate-900 dark:hover:text-slate-200 transition-all duration-200" href="#">Terms of Service</a>
<a class="text-sm font-normal text-slate-500 hover:text-slate-900 dark:hover:text-slate-200 transition-all duration-200" href="#">Help Center</a>
</div>
</div>
</footer>
</body></html>
